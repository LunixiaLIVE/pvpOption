modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"

[[mixins]]
    config = "pvpoption.common.mixins.json"

[[mods]]
    modId = "pvpoption"
    version = "${version}"
    displayName = "pvpOption"
