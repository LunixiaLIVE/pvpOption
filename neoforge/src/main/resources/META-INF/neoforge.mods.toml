    type = "required"
    versionRange = "[1.21.1,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.pvpoption]]
    modId = "architectury"
    type = "required"
    versionRange = "*"
    ordering = "NONE"
    side = "BOTH"
